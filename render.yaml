services:
  - type: web
    name: career-crox
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: HOST
        value: 0.0.0.0
      - key: REQUIRE_POSTGRES
        value: true

      - key: NODE_ENV
        value: production
      - key: PG_POOL_MAX
        value: 6
