<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Performance Centre</title>
  <style>
    :root{
      --bg:#f4f7fb;--panel:#ffffff;--line:#dbe6f5;--text:#173052;--muted:#6e7f9b;--shadow:0 18px 38px rgba(26,43,74,.08);
      --green:#27c36a;--blue:#4386ff;--sky:#57b6ff;--orange:#ff9a43;--purple:#8b6dff;--red:#ef5b5b;
    }
    *{box-sizing:border-box}
    body{margin:0;padding:14px;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#f7f9fd 0,#eef4fb 100%);color:var(--text)}
    .shell{max-width:100%;display:flex;flex-direction:column;gap:14px}
    .cards-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
    .metric-card{position:relative;overflow:hidden;border-radius:22px;padding:18px 18px 16px;box-shadow:var(--shadow);color:#fff;min-height:112px;border:1px solid rgba(255,255,255,.18)}
    .metric-card::after{content:'';position:absolute;left:-20px;right:-20px;bottom:-35px;height:85px;background:radial-gradient(circle at 50% 0,rgba(255,255,255,.28),transparent 62%)}
    .metric-card>*{position:relative;z-index:1}
    .metric-card .label{font-size:12px;font-weight:800;opacity:.94}
    .metric-card .value{font-size:36px;line-height:1.05;font-weight:900;margin-top:6px}
    .metric-card .hint{font-size:12px;opacity:.92;margin-top:4px}
    .tone-blue{background:linear-gradient(135deg,#4489ff,#73b4ff)}
    .tone-sky{background:linear-gradient(135deg,#45a7ff,#60d7bd)}
    .tone-green{background:linear-gradient(135deg,#1dbd66,#7ad96d)}
    .tone-orange{background:linear-gradient(135deg,#ff9a43,#ffbe63)}
    .tone-purple{background:linear-gradient(135deg,#7e75ff,#b084ff)}
    .tone-red{background:linear-gradient(135deg,#ff6f8b,#ff9c8d)}
    .panel{background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border:1px solid rgba(215,228,245,.95);border-radius:24px;box-shadow:var(--shadow)}
    .insight-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .insight-card{padding:18px 20px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(244,248,255,.98));border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:120px}
    .insight-card .tag{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:8px}
    .tag-green{background:rgba(39,195,106,.12);color:#178b4b}.tag-red{background:rgba(239,91,91,.12);color:#cb3535}.tag-orange{background:rgba(255,154,67,.16);color:#c46c15}
    .insight-card h3{margin:0 0 6px;font-size:26px;line-height:1.05}
    .insight-card p{margin:0;color:var(--muted);font-size:13px}
    .mini-metrics{display:grid;gap:8px;text-align:right}
    .mini-metrics b{font-size:22px}
    .toolbar{padding:18px}
    .toolbar-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .toolbar h2{margin:0;font-size:22px}
    .toolbar p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .export-btn{border:0;background:linear-gradient(135deg,#21b663,#4fd987);color:#fff;border-radius:14px;padding:12px 18px;font-weight:800;cursor:pointer;box-shadow:0 10px 22px rgba(33,182,99,.24)}
    .group{display:flex;flex-direction:column;gap:8px}
    .group-title{font-size:11px;font-weight:900;color:#7285a4;text-transform:uppercase;letter-spacing:.08em}
    .chip-row{display:flex;gap:8px;flex-wrap:wrap}
    .chip,.mode-btn,.preset-btn{border:1px solid #d5e2f5;background:#f9fbff;color:#33507b;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:13px}
    .chip.active,.mode-btn.active,.preset-btn.active{color:#fff;border-color:transparent;box-shadow:0 10px 22px rgba(57,102,181,.18)}
    .chip.active{background:linear-gradient(135deg,#4a86ff,#7fb9ff)}
    .mode-btn[data-mode="live"].active{background:linear-gradient(135deg,#1fb862,#53da8b)}
    .mode-btn[data-mode="custom"].active{background:linear-gradient(135deg,#5e95ff,#8a6dff)}
    .mode-btn[data-mode="range"].active{background:linear-gradient(135deg,#ff9a43,#ffbf62)}
    .preset-btn.active{background:linear-gradient(135deg,#4a86ff,#7fb9ff)}
    .filters-grid{display:grid;grid-template-columns:2.1fr 1.6fr 1.4fr;gap:14px}
    .control-box{padding:14px;border-radius:18px;border:1px solid #dde8f8;background:rgba(249,252,255,.96)}
    .control-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .control-row input,.control-row select{border:1px solid #d5e2f5;background:#fff;border-radius:12px;padding:11px 12px;font:inherit;color:var(--text);min-width:0}
    .control-row input[type="number"]{width:108px}
    .control-row input[type="datetime-local"]{min-width:210px}
    .small-note{font-size:12px;color:var(--muted)}
    .table-panel{padding:16px 16px 8px}
    .table-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .table-head h3{margin:0;font-size:20px}.table-head p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .mini-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:#eef5ff;color:#4a6ea9;font-size:12px;font-weight:800}
    .table-wrap{overflow:auto;border-radius:18px;border:1px solid #dde7f5}
    table{width:100%;border-collapse:collapse;background:#fff;min-width:1180px}
    thead th{position:sticky;top:0;background:linear-gradient(180deg,#f8fbff,#eef4fb);text-align:left;color:#60779c;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:12px 12px;border-bottom:1px solid #dde7f5;z-index:1}
    tbody td{padding:13px 12px;border-bottom:1px solid #edf2fb;font-size:14px;vertical-align:top}
    tbody tr:hover{background:#fbfdff}
    tbody tr.row-good{background:rgba(39,195,106,.06)}
    tbody tr.row-bad{background:rgba(239,91,91,.06)}
    tbody tr.row-neutral{background:rgba(78,134,255,.04)}
    .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-weight:900;background:#edf4ff;color:#2f64c7}
    .user-cell{display:flex;flex-direction:column;gap:4px}.user-name{font-weight:800}.user-sub{font-size:12px;color:var(--muted)}
    .code-badge,.status-badge{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .code-badge{background:#eef5ff;color:#4773b6;border:1px solid #d9e6f7}.status-good{background:rgba(39,195,106,.12);color:#148244}.status-bad{background:rgba(239,91,91,.12);color:#c53b3b}.status-mid{background:rgba(255,154,67,.16);color:#bf7015}
    .muted{color:var(--muted)}
    .stream-empty,.error-box,.loading-box{padding:18px;text-align:center;color:var(--muted)}
    .footer-note{font-size:12px;color:#6f84a7;padding:0 18px 18px}
    @media (max-width:1400px){.cards-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.filters-grid{grid-template-columns:1fr}.insight-grid{grid-template-columns:1fr}}
    @media (max-width:760px){body{padding:10px}.cards-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.metric-card .value{font-size:30px}.control-row input[type="datetime-local"]{min-width:100%}}
  </style>
</head>
<body>
  <div id="app" class="shell"><div class="loading-box panel">Loading performance centre.</div></div>
  <script>
    (function(){
      const app = document.getElementById('app');
      const state = {
        data: null,
        loading: true,
        error: '',
        selectedRecruiters: new Set(),
        mode: 'live',
        preset: '1h',
        customHours: 6,
        customDays: 0,
        fromAt: '',
        toAt: '',
        category: 'all',
      };
      const presetMap = {
        '10m': { label: 'Last 10 mins', minutes: 10 },
        '30m': { label: 'Last 30 mins', minutes: 30 },
        '1h': { label: 'Last 1 hour', minutes: 60 },
        '3h': { label: 'Last 3 hours', minutes: 180 },
        '6h': { label: 'Last 6 hours', minutes: 360 },
        '9h': { label: 'Last 9 hours', minutes: 540 },
        '1d': { label: 'Last 1 day', minutes: 1440 },
        '3d': { label: 'Last 3 days', minutes: 4320 },
        '1w': { label: 'Last whole week', minutes: 10080 },
        '1m': { label: 'Last month', minutes: 43200 },
      };
      let liveTimer = null;

      function lower(value){ return String(value || '').trim().toLowerCase(); }
      function toMs(value){ const time = new Date(value || 0).getTime(); return Number.isFinite(time) ? time : 0; }
      function escapeHtml(value){ return String(value ?? '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char])); }
      function fmtMinutes(total){ const minutes = Math.max(0, Math.round(Number(total || 0))); const hrs = Math.floor(minutes / 60); const mins = minutes % 60; if (hrs && mins) return hrs + 'h ' + mins + 'm'; if (hrs) return hrs + 'h'; return mins + 'm'; }
      function fmtNumber(value){ return new Intl.NumberFormat('en-IN').format(Number(value || 0)); }
      function fmtDate(value){ if (!value) return '-'; const date = new Date(value); if (Number.isNaN(date.getTime())) return escapeHtml(String(value)); return date.toLocaleString([], { hour12: true, year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
      function fmtDateForInput(value){ if (!value) return ''; const d = new Date(value); if (Number.isNaN(d.getTime())) return ''; const p = (n) => String(n).padStart(2, '0'); return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes()); }
      function actionLabel(action){ const map = {submitted_for_approval:'Submission Created',submission_approved:'Submission Approved',submission_rejected:'Submission Rejected',interview_scheduled:'Interview Scheduled',call_logged:'Call Logged',whatsapp_opened:'WhatsApp Opened',profile_opened:'Profile Opened',profile_updated:'Profile Updated',crm_locked:'CRM Locked',no_call_lock:'No Call Lock',break_started:'Break Started',break_ended:'Break Ended'}; return map[action] || String(action || '').replace(/[_-]+/g,' ').replace(/\b\w/g, (c) => c.toUpperCase()); }
      function categoryFromAction(action){ const value = lower(action); if (value.includes('submission')) return 'submission'; if (value.includes('interview')) return 'interview'; if (value.includes('call')) return 'calls'; if (value.includes('whatsapp')) return 'whatsapp'; if (value.includes('profile_open')) return 'profiles_open'; if (value.includes('crm_locked') || value.includes('unlock') || value.includes('no_call_lock')) return 'crm_lock'; if (value.includes('break')) return 'break'; return 'other'; }
      function categoryLabel(value){ return ({all:'All Categories',submission:'Submission',interview:'Interview',calls:'Calls',whatsapp:'WhatsApp',profiles_open:'Profiles Open'}[value] || value); }
      function matchesRecruiter(code, candidateCode, name, candidateName){ return lower(code) && (lower(code) === lower(candidateCode) || lower(name) === lower(candidateName)); }
      function getRange(){ const now = Date.now(); if (state.mode === 'range') { return { from: toMs(state.fromAt), to: toMs(state.toAt) || now, label: 'From / To' }; }
        if (state.mode === 'custom') {
          const minutes = (Number(state.customDays || 0) * 24 * 60) + (Number(state.customHours || 0) * 60);
          const safeMinutes = Math.max(60, minutes || 60);
          return { from: now - (safeMinutes * 60000), to: now, label: 'Custom window' };
        }
        const preset = presetMap[state.preset] || presetMap['1h'];
        return { from: now - (preset.minutes * 60000), to: now, label: preset.label };
      }
      function activeRecruiterCodes(){
        const options = (state.data?.recruiter_options || []).map((item) => item.recruiter_code || item.user_id).filter(Boolean);
        if (!state.selectedRecruiters.size) return new Set(options);
        return new Set([...state.selectedRecruiters]);
      }
      function buildDerivedActivities(data){
        const raw = Array.isArray(data.activity_items) ? data.activity_items.slice() : [];
        const derivedSubmissions = (data.submissions || []).map((row) => ({
          activity_id: 'SUB-' + row.submission_id,
          user_id: row.submitted_by_user_id || '',
          full_name: row.recruiter_name || row.recruiter_code || '',
          recruiter_code: row.recruiter_code || '',
          role: 'recruiter',
          candidate_id: row.candidate_id || '',
          candidate_name: row.candidate_name || '',
          action_type: 'submission_event',
          action_label: 'Submission Entry',
          category: 'submission',
          created_at: row.submitted_at || '',
          metadata: { approval_status: row.approval_status || '', status: row.status || '', derived: true }
        }));
        const derivedInterviews = (data.interviews || []).map((row) => ({
          activity_id: 'INT-' + row.interview_id,
          user_id: row.submitted_by_user_id || '',
          full_name: row.recruiter_name || row.recruiter_code || '',
          recruiter_code: row.recruiter_code || '',
          role: 'recruiter',
          candidate_id: row.candidate_id || '',
          candidate_name: row.candidate_name || '',
          action_type: 'interview_scheduled',
          action_label: 'Interview Scheduled',
          category: 'interview',
          created_at: row.created_at || row.scheduled_at || '',
          metadata: { stage: row.stage || '', status: row.status || '', derived: true }
        }));
        return raw.concat(derivedSubmissions, derivedInterviews).sort((a,b) => toMs(b.created_at) - toMs(a.created_at));
      }
      function compute(){
        const data = state.data || {};
        const range = getRange();
        const recruiterCodes = activeRecruiterCodes();
        const optionList = (data.recruiter_options || []).filter((item) => recruiterCodes.has(item.recruiter_code || item.user_id));
        const users = Array.isArray(data.users) ? data.users : [];
        const presence = new Map((data.presence || []).map((item) => [String(item.user_id), item]));
        const baseActivities = buildDerivedActivities(data);
        const filteredActivities = baseActivities.filter((item) => {
          const ts = toMs(item.created_at);
          if (range.from && ts < range.from) return false;
          if (range.to && ts > range.to) return false;
          const code = item.recruiter_code || '';
          const identity = String(item.user_id || '');
          if (recruiterCodes.size) {
            const matchedByCode = code && recruiterCodes.has(code);
            const matchedByUser = identity && recruiterCodes.has(identity);
            if (!matchedByCode && !matchedByUser && (code || identity)) return false;
          }
          if (state.category !== 'all' && item.category !== state.category) return false;
          return true;
        });
        const rows = optionList.map((opt) => {
          const code = opt.recruiter_code || opt.user_id;
          const user = users.find((item) => String(item.user_id) === String(opt.user_id) || lower(item.recruiter_code) === lower(code)) || {};
          const identity = String(opt.user_id || '');
          const mineActivities = filteredActivities.filter((item) => String(item.user_id || '') === identity || lower(item.recruiter_code) === lower(code));
          const submitted = (data.submissions || []).filter((item) => (String(item.submitted_by_user_id || '') === identity || lower(item.recruiter_code) === lower(code)) && (!range.from || toMs(item.submitted_at) >= range.from) && (!range.to || toMs(item.submitted_at) <= range.to)).length;
          const interviews = (data.interviews || []).filter((item) => lower(item.recruiter_code) === lower(code) && (!range.from || toMs(item.created_at || item.scheduled_at) >= range.from) && (!range.to || toMs(item.created_at || item.scheduled_at) <= range.to)).length;
          const calls = mineActivities.filter((item) => item.category === 'calls').length;
          const whatsapp = mineActivities.filter((item) => item.category === 'whatsapp').length;
          const profiles = mineActivities.filter((item) => item.category === 'profiles_open').length;
          const crmLocked = mineActivities.filter((item) => ['crm_locked','no_call_lock'].includes(lower(item.action_type))).length;
          const breakEvents = mineActivities.filter((item) => item.category === 'break').length;
          const lastTs = mineActivities.length ? Math.max(...mineActivities.map((item) => toMs(item.created_at))) : toMs(presence.get(String(user.user_id))?.last_seen_at || user.last_activity_at || data.generated_at || Date.now());
          const idleMinutes = Math.max(0, Math.round((Date.now() - lastTs) / 60000));
          const sorted = mineActivities.map((item) => toMs(item.created_at)).filter(Boolean).sort((a,b) => a-b);
          let avgGap = 0;
          if (sorted.length > 1) {
            let totalGap = 0;
            for (let i=1;i<sorted.length;i++) totalGap += Math.max(0, Math.round((sorted[i]-sorted[i-1]) / 60000));
            avgGap = Math.round(totalGap / (sorted.length - 1));
          } else {
            avgGap = idleMinutes;
          }
          const presenceRow = presence.get(String(user.user_id)) || {};
          const breakMinutes = Number(presenceRow.total_break_minutes || 0);
          const loginMinutes = presenceRow.work_started_at ? Math.max(0, Math.round((Date.now() - toMs(presenceRow.work_started_at)) / 60000)) : 0;
          const workMinutes = Math.max(loginMinutes - breakMinutes, 0);
          const recentWindowStart = Date.now() - 1800000;
          const recentActivities = mineActivities.filter((item) => toMs(item.created_at) >= recentWindowStart);
          const noCall30 = recentActivities.some((item) => item.category === 'calls') ? 0 : 1;
          const noProfileOpen30 = recentActivities.some((item) => item.category === 'profiles_open') ? 0 : 1;
          const activeBreak = presenceRow.is_on_break ? 'Yes' : 'No';
          const totalActivities = mineActivities.filter((item) => ['submission','interview','calls','whatsapp','profiles_open','crm_lock','break'].includes(item.category)).length;
          const score = (submitted * 14) + (interviews * 10) + (calls * 9) + (whatsapp * 4) + (profiles * 3) + totalActivities - (idleMinutes * .65) - (crmLocked * 10) - (breakMinutes * .08) - (avgGap * .35);
          return {
            user_id: user.user_id || opt.user_id,
            full_name: user.full_name || opt.full_name || code,
            recruiter_code: code,
            role: user.role || opt.role || 'recruiter',
            designation: user.designation || '',
            idle_minutes: idleMinutes,
            crm_locked_count: crmLocked,
            break_minutes: breakMinutes,
            break_events: breakEvents,
            login_minutes: loginMinutes,
            work_minutes: workMinutes,
            last_activity_at: lastTs ? new Date(lastTs).toISOString() : '',
            active_break: activeBreak,
            no_call_30: noCall30,
            no_profile_open_30: noProfileOpen30,
            submissions: submitted,
            interviews,
            calls,
            whatsapp,
            profiles,
            total_activities: totalActivities,
            avg_gap_minutes: avgGap,
            score,
            row_class: score > 35 ? 'row-good' : score < 6 ? 'row-bad' : 'row-neutral'
          };
        }).sort((a,b) => b.score - a.score).map((item, index) => ({ ...item, rank: index + 1 }));

        const cards = {
          visibleTeam: rows.length,
          recruiters: rows.filter((item) => lower(item.role) === 'recruiter').length,
          activities: filteredActivities.length,
          submissions: rows.reduce((sum,item) => sum + item.submissions, 0),
          calls: rows.reduce((sum,item) => sum + item.calls, 0),
          whatsapp: rows.reduce((sum,item) => sum + item.whatsapp, 0),
          breakEvents: rows.reduce((sum,item) => sum + item.break_events, 0),
          breakMinutes: rows.reduce((sum,item) => sum + item.break_minutes, 0),
          loginMinutes: rows.reduce((sum,item) => sum + item.login_minutes, 0),
          workMinutes: rows.reduce((sum,item) => sum + item.work_minutes, 0),
          idle15: rows.filter((item) => item.idle_minutes >= 15).length,
          noCall30: rows.reduce((sum,item) => sum + item.no_call_30, 0),
          noProfileOpen30: rows.reduce((sum,item) => sum + item.no_profile_open_30, 0),
        };
        const best = rows[0] || null;
        const poor = rows.length ? rows[rows.length - 1] : null;
        const slow = rows.slice().sort((a,b) => b.avg_gap_minutes - a.avg_gap_minutes)[0] || null;
        return { range, rows, cards, best, poor, slow, filteredActivities };
      }
      function exportCsv(){
        const { rows, range } = compute();
        const header = ['Rank','Recruiter','Code','Role','Idle Time','CRM Locked','Break Count','Break Time','Login Minutes','Work Minutes','Last Activity','On Break','No Call 30m','No Profile Open 30m','Submissions','Calls','WhatsApp','Profiles Open','Interviews','Total Activities','Average Gap','Score'];
        const lines = rows.map((row) => [row.rank,row.full_name,row.recruiter_code,row.role,fmtMinutes(row.idle_minutes),row.crm_locked_count,row.break_events,fmtMinutes(row.break_minutes),fmtMinutes(row.login_minutes),fmtMinutes(row.work_minutes),fmtDate(row.last_activity_at),row.active_break,row.no_call_30,row.no_profile_open_30,row.submissions,row.calls,row.whatsapp,row.profiles,row.interviews,row.total_activities,fmtMinutes(row.avg_gap_minutes),row.score.toFixed(1)]);
        const csv = [header.join(','), ...lines.map((line) => line.map((value) => '"' + String(value).replace(/"/g,'""') + '"').join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'performance-centre-' + range.label.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }
      function bindEvents(){
        app.querySelectorAll('[data-role="mode"]').forEach((btn) => btn.addEventListener('click', () => { state.mode = btn.dataset.mode; render(); setupLive(); }));
        app.querySelectorAll('[data-role="preset"]').forEach((btn) => btn.addEventListener('click', () => { state.preset = btn.dataset.value; state.mode = 'live'; render(); setupLive(); }));
        app.querySelectorAll('[data-role="recruiter-chip"]').forEach((btn) => btn.addEventListener('click', () => {
          const code = btn.dataset.code;
          if (code === '__all__') {
            state.selectedRecruiters = new Set((state.data?.recruiter_options || []).map((item) => item.recruiter_code || item.user_id).filter(Boolean));
          } else {
            if (!state.selectedRecruiters.size) state.selectedRecruiters = new Set((state.data?.recruiter_options || []).map((item) => item.recruiter_code || item.user_id).filter(Boolean));
            if (state.selectedRecruiters.has(code)) state.selectedRecruiters.delete(code); else state.selectedRecruiters.add(code);
          }
          render();
        }));
        const category = app.querySelector('#perf-category');
        if (category) category.addEventListener('change', (e) => { state.category = e.target.value; render(); });
        const customHours = app.querySelector('#custom-hours');
        if (customHours) customHours.addEventListener('change', (e) => { state.customHours = Number(e.target.value || 0); state.mode = 'custom'; render(); setupLive(); });
        const customDays = app.querySelector('#custom-days');
        if (customDays) customDays.addEventListener('change', (e) => { state.customDays = Number(e.target.value || 0); state.mode = 'custom'; render(); setupLive(); });
        const fromAt = app.querySelector('#from-at');
        if (fromAt) fromAt.addEventListener('change', (e) => { state.fromAt = e.target.value; state.mode = 'range'; render(); setupLive(); });
        const toAt = app.querySelector('#to-at');
        if (toAt) toAt.addEventListener('change', (e) => { state.toAt = e.target.value; state.mode = 'range'; render(); setupLive(); });
        const exportBtn = app.querySelector('#export-report');
        if (exportBtn) exportBtn.addEventListener('click', exportCsv);
      }
      function insightMarkup(item, kind){
        if (!item) return '<div class="insight-card"><div><span class="tag tag-orange">No data</span><h3>-</h3><p>No seeded activity is available for this window.</p></div><div class="mini-metrics"><span class="muted">Window</span><b>0</b></div></div>';
        const tagClass = kind === 'best' ? 'tag-green' : kind === 'poor' ? 'tag-red' : 'tag-orange';
        const tagText = kind === 'best' ? 'Best Performer' : kind === 'poor' ? 'Poor Performer' : 'Low Call Speed';
        const subText = kind === 'best' ? 'Top activity score in current window.' : kind === 'poor' ? 'Needs attention before queue slips.' : 'This queue has the widest average activity gap in the current window.';
        const metric = kind === 'slow' ? fmtMinutes(item.avg_gap_minutes) : item.score.toFixed(1);
        const metricLabel = kind === 'slow' ? 'Average gap' : 'Performance score';
        return '<div class="insight-card"><div><span class="tag ' + tagClass + '">' + tagText + '</span><h3>' + escapeHtml(item.full_name) + '</h3><p>' + escapeHtml(item.recruiter_code) + ' • ' + escapeHtml(item.role) + '</p><p style="margin-top:8px">' + subText + '</p></div><div class="mini-metrics"><span class="muted">' + metricLabel + '</span><b>' + escapeHtml(metric) + '</b><span class="muted">Calls ' + item.calls + ' • Sub ' + item.submissions + ' • Work ' + fmtMinutes(item.work_minutes) + '</span></div></div>';
      }
      function render(){
        if (state.loading) { app.innerHTML = '<div class="loading-box panel">Loading performance centre.</div>'; reportHeight(); return; }
        if (state.error) { app.innerHTML = '<div class="error-box panel">' + escapeHtml(state.error) + '</div>'; reportHeight(); return; }
        const { rows, cards, best, poor, slow, filteredActivities, range } = compute();
        const optionCodes = (state.data?.recruiter_options || []).map((item) => item.recruiter_code || item.user_id).filter(Boolean);
        const activeCodes = activeRecruiterCodes();
        const allSelected = optionCodes.length && optionCodes.every((code) => activeCodes.has(code));
        const recruiterChips = ['<button class="chip ' + (allSelected ? 'active' : '') + '" data-role="recruiter-chip" data-code="__all__">All</button>']
          .concat((state.data?.recruiter_options || []).map((item) => {
            const code = item.recruiter_code || item.user_id;
            const active = activeCodes.has(code);
            return '<button class="chip ' + (active ? 'active' : '') + '" data-role="recruiter-chip" data-code="' + escapeHtml(code) + '">' + escapeHtml(item.full_name) + ' (' + escapeHtml(code) + ')</button>';
          })).join('');
        const rowHtml = rows.length ? rows.map((row) => {
          const statusClass = row.rank === 1 ? 'status-good' : row.rank === rows.length ? 'status-bad' : 'status-mid';
          const statusText = row.rank === 1 ? 'Top' : row.rank === rows.length ? 'Needs Push' : 'Stable';
          return '<tr class="' + row.row_class + '"><td><span class="rank-badge">' + row.rank + '</span></td><td><div class="user-cell"><span class="user-name">' + escapeHtml(row.full_name) + '</span><span class="user-sub">' + escapeHtml(row.designation || row.role) + '</span></div></td><td><span class="code-badge">' + escapeHtml(row.recruiter_code) + '</span></td><td>' + escapeHtml(row.role) + '</td><td>' + fmtMinutes(row.idle_minutes) + '</td><td>' + row.crm_locked_count + '</td><td>' + row.break_events + '</td><td>' + fmtMinutes(row.break_minutes) + '</td><td>' + fmtMinutes(row.login_minutes) + '</td><td>' + fmtMinutes(row.work_minutes) + '</td><td>' + escapeHtml(fmtDate(row.last_activity_at)) + '</td><td>' + escapeHtml(row.active_break) + '</td><td>' + row.no_call_30 + '</td><td>' + row.no_profile_open_30 + '</td><td>' + row.submissions + '</td><td>' + row.calls + '</td><td>' + row.whatsapp + '</td><td>' + row.profiles + '</td><td>' + row.interviews + '</td><td>' + row.total_activities + '</td><td>' + fmtMinutes(row.avg_gap_minutes) + '</td><td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td></tr>';
        }).join('') : '<tr><td colspan="15" class="stream-empty">No recruiter data matched the current filter window.</td></tr>';
        const activityHtml = filteredActivities.length ? filteredActivities.slice(0, 180).map((item, index) => '<tr><td>' + (index + 1) + '</td><td>' + fmtDate(item.created_at) + '</td><td>' + escapeHtml(item.full_name || item.recruiter_code || '-') + '</td><td><span class="code-badge">' + escapeHtml(item.recruiter_code || '-') + '</span></td><td>' + escapeHtml(categoryLabel(item.category)) + '</td><td>' + escapeHtml(item.action_label || actionLabel(item.action_type)) + '</td><td>' + escapeHtml(item.candidate_name || item.candidate_id || '-') + '</td><td class="muted">' + escapeHtml((item.metadata && (item.metadata.status || item.metadata.approval_status || item.metadata.stage || item.metadata.reason || item.metadata.text)) || '-') + '</td></tr>').join('') : '<tr><td colspan="8" class="stream-empty">No activity found in this window.</td></tr>';
        app.innerHTML = '<div class="cards-grid">'
          + '<div class="metric-card tone-blue"><div class="label">Visible Team</div><div class="value">' + fmtNumber(cards.visibleTeam) + '</div><div class="hint">Selected recruiters/users</div></div>'
          + '<div class="metric-card tone-sky"><div class="label">Recruiters</div><div class="value">' + fmtNumber(cards.recruiters) + '</div><div class="hint">Active recruiter rows</div></div>'
          + '<div class="metric-card tone-green"><div class="label">Live Activity</div><div class="value">' + fmtNumber(cards.activities) + '</div><div class="hint">Current filtered actions</div></div>'
          + '<div class="metric-card tone-orange"><div class="label">Submissions</div><div class="value">' + fmtNumber(cards.submissions) + '</div><div class="hint">Window based count</div></div>'
          + '<div class="metric-card tone-purple"><div class="label">Calls</div><div class="value">' + fmtNumber(cards.calls) + '</div><div class="hint">Logged calls in window</div></div>'
          + '<div class="metric-card tone-red"><div class="label">WhatsApp</div><div class="value">' + fmtNumber(cards.whatsapp) + '</div><div class="hint">Tracked WhatsApp opens</div></div>'
          + '<div class="metric-card tone-blue"><div class="label">Breaks</div><div class="value">' + fmtNumber(cards.breakEvents) + '</div><div class="hint">Break starts in window</div></div>'
          + '<div class="metric-card tone-sky"><div class="label">Break Minutes</div><div class="value">' + fmtNumber(cards.breakMinutes) + '</div><div class="hint">Total break minutes</div></div>'
          + '<div class="metric-card tone-green"><div class="label">Login Minutes</div><div class="value">' + fmtNumber(cards.loginMinutes) + '</div><div class="hint">Current running sessions</div></div>'
          + '<div class="metric-card tone-purple"><div class="label">Work Minutes</div><div class="value">' + fmtNumber(cards.workMinutes) + '</div><div class="hint">Session minus breaks</div></div>'
          + '<div class="metric-card tone-orange"><div class="label">Idle 15m+</div><div class="value">' + fmtNumber(cards.idle15) + '</div><div class="hint">Watch these users</div></div>'
          + '<div class="metric-card tone-red"><div class="label">No Call 30m</div><div class="value">' + fmtNumber(cards.noCall30) + '</div><div class="hint">No call in last 30 minutes</div></div>'
          + '<div class="metric-card tone-blue"><div class="label">No Profile Open 30m</div><div class="value">' + fmtNumber(cards.noProfileOpen30) + '</div><div class="hint">No profile open in last 30 minutes</div></div>'
          + '</div>'
          + '<div class="insight-grid">' + insightMarkup(best, 'best') + insightMarkup(poor, 'poor') + insightMarkup(slow, 'slow') + '</div>'
          + '<div class="panel toolbar">'
          + '<div class="toolbar-head"><div><h2>Recruiter Performance Filters</h2><p>Color-rich controls with practical filters that stay usable in day-to-day operations.</p></div><button id="export-report" class="export-btn">Export Report</button></div>'
          + '<div class="filters-grid">'
          + '<div class="control-box group"><div class="group-title">Recruiters</div><div class="chip-row">' + recruiterChips + '</div><div class="small-note">Use All for the full team view, or select only the recruiters you want to review.</div></div>'
          + '<div class="control-box group"><div class="group-title">Duration Mode</div><div class="chip-row"><button class="mode-btn ' + (state.mode === 'live' ? 'active' : '') + '" data-mode="live" data-role="mode">Live Activity</button><button class="mode-btn ' + (state.mode === 'custom' ? 'active' : '') + '" data-mode="custom" data-role="mode">Customize</button><button class="mode-btn ' + (state.mode === 'range' ? 'active' : '') + '" data-mode="range" data-role="mode">From / To</button></div><div class="small-note">Current window: ' + escapeHtml(range.label) + '</div></div>'
          + '<div class="control-box group"><div class="group-title">Category</div><div class="control-row"><select id="perf-category"><option value="all" ' + (state.category === 'all' ? 'selected' : '') + '>All</option><option value="submission" ' + (state.category === 'submission' ? 'selected' : '') + '>Submission</option><option value="interview" ' + (state.category === 'interview' ? 'selected' : '') + '>Interview</option><option value="calls" ' + (state.category === 'calls' ? 'selected' : '') + '>Calls</option><option value="whatsapp" ' + (state.category === 'whatsapp' ? 'selected' : '') + '>WhatsApp</option><option value="profiles_open" ' + (state.category === 'profiles_open' ? 'selected' : '') + '>Profiles Open</option></select></div><div class="small-note">The default category is set to All for a wider performance view.</div></div>'
          + '</div>'
          + '<div class="control-box group" style="margin-top:14px"><div class="group-title">Duration Presets</div><div class="chip-row">'
          + Object.keys(presetMap).map((key) => '<button class="preset-btn ' + (state.preset === key && state.mode === 'live' ? 'active' : '') + '" data-role="preset" data-value="' + key + '">' + escapeHtml(presetMap[key].label) + '</button>').join('')
          + '</div></div>'
          + '<div class="control-box group" style="margin-top:14px"><div class="group-title">Customize / From-To</div><div class="control-row"><input id="custom-hours" type="number" min="0" step="1" value="' + escapeHtml(state.customHours) + '" /><span class="small-note">hours</span><input id="custom-days" type="number" min="0" step="1" value="' + escapeHtml(state.customDays) + '" /><span class="small-note">days</span><input id="from-at" type="datetime-local" value="' + escapeHtml(state.fromAt || fmtDateForInput(Date.now() - 21600000)) + '" /><input id="to-at" type="datetime-local" value="' + escapeHtml(state.toAt || fmtDateForInput(Date.now())) + '" /></div><div class="small-note">Use custom hours or days for a rolling view, or choose an exact start and end date/time range.</div></div>'
          + '</div>'
          + '<div class="panel table-panel"><div class="table-head"><div><h3>Performance Leaderboard</h3><p>Idle time, break count, break time, login/work minutes, submissions, calls, WhatsApp activity, profile opens, interviews, last activity, and 30-minute watch flags in one leaderboard.</p></div><span class="mini-pill">' + rows.length + ' recruiters/users</span></div><div class="table-wrap"><table><thead><tr><th>Rank</th><th>Recruiter</th><th>Code</th><th>Role</th><th>Idle Time</th><th>CRM Locked</th><th>Break Count</th><th>Break Time</th><th>Login Minutes</th><th>Work Minutes</th><th>Last Activity</th><th>On Break</th><th>No Call 30m</th><th>No Profile Open 30m</th><th>Submissions</th><th>Calls</th><th>WhatsApp</th><th>Profiles Open</th><th>Interviews</th><th>Total Activities</th><th>Average Gap</th><th>Status</th></tr></thead><tbody>' + rowHtml + '</tbody></table></div><div class="footer-note">Rows are visually highlighted to make strong and weak performance easier to review.</div></div>'
          + '<div class="panel table-panel"><div class="table-head"><div><h3>Live Activity Stream</h3><p>The activity stream below refreshes with the latest actions for the selected recruiters.</p></div><span class="mini-pill">' + filteredActivities.length + ' activities</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Time</th><th>Recruiter</th><th>Code</th><th>Category</th><th>Action</th><th>Candidate</th><th>Details</th></tr></thead><tbody>' + activityHtml + '</tbody></table></div><div class="footer-note">Live mode refreshes automatically. Custom and date-range modes keep the selected time window fixed.</div></div>';
        bindEvents();
        reportHeight();
      }
      async function fetchData(){
        state.loading = !state.data;
        render();
        try {
          const res = await fetch('/api/performance-centre?live=1', { credentials: 'include', cache: 'no-store' });
          if (!res.ok) throw new Error('Performance API failed with status ' + res.status);
          state.data = await res.json();
          if (!state.selectedRecruiters.size) state.selectedRecruiters = new Set((state.data.recruiter_options || []).map((item) => item.recruiter_code || item.user_id).filter(Boolean));
          state.error = '';
        } catch (error) {
          state.error = error.message || 'Unable to load performance data.';
        } finally {
          state.loading = false;
          render();
        }
      }
      function setupLive(){
        if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
        if (state.mode === 'live') liveTimer = setInterval(fetchData, 3500);
      }
      function reportHeight(){
        setTimeout(() => {
          try { window.parent.postMessage({ type: 'career-crox-performance-height', height: Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 12 }, '*'); } catch {}
        }, 30);
      }
      window.addEventListener('resize', reportHeight);
      fetchData();
      setupLive();
    })();
  </script>
</body>
</html>
